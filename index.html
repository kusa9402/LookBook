<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKBOOK</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--surface:#141414;--card:#1C1C1C;--cream:#F5F0E8;--gold:#C9A96E;--gold-light:#E8D5A3;--sub:#6B6B6B;--border:#2A2A2A;--white:#fff;--danger:#C0392B}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
/* UTIL */
.serif{font-family:'Playfair Display',serif}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn:hover{background:var(--gold);color:var(--bg)}
.btn-solid{background:var(--gold);color:var(--bg)}
.btn-solid:hover{background:var(--gold-light)}
.btn-ghost{border-color:var(--border);color:var(--sub)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);background:transparent}
.btn-sm{padding:6px 12px;font-size:10px}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
input[type=text],textarea{background:var(--bg);border:1px solid var(--border);color:var(--cream);font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border .2s;width:100%}
input[type=text]:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:80px}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-box{width:320px;border:1px solid var(--border);padding:48px 36px;text-align:center}
.auth-logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:.12em;margin-bottom:6px}
.auth-tag{font-size:10px;letter-spacing:.25em;color:var(--sub);text-transform:uppercase;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border)}
#auth-pw{background:var(--bg);border:1px solid var(--border);color:var(--cream);font-family:'Inter',sans-serif;font-size:13px;padding:10px 14px;outline:none;width:100%;text-align:center;letter-spacing:.2em;margin-bottom:16px}
#auth-pw:focus{border-color:var(--gold)}
#auth-err{color:var(--danger);font-size:11px;margin-top:8px;min-height:16px}
.auth-hint{color:var(--sub);font-size:10px;margin-top:14px}

/* EDIT BAR */
#editbar{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,.95);border-bottom:1px solid var(--gold);z-index:1000;padding:8px 24px;display:none;align-items:center;justify-content:space-between;backdrop-filter:blur(8px)}
#editbar.on{display:flex}
.edit-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.edit-status{display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}

/* PAGES */
.pg{display:none}
.pg.on{display:block}
body.edit-mode .pg.on{padding-top:46px}

/* ── MAIN ── */
#hdr{position:relative;height:200px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surface)}
#hdr-bg{position:absolute;inset:0;background-size:cover;background-position:center}
#hdr-dim{position:absolute;inset:0;background:rgba(0,0,0,.4)}
#hdr-content{position:relative;z-index:2;text-align:center;padding:0 20px}
.hdr-eye{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.hdr-title{font-family:'Playfair Display',serif;font-size:clamp(32px,6vw,64px);font-weight:700;letter-spacing:.08em;color:#fff;text-transform:uppercase;line-height:1}
.hdr-sub{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.6);margin-top:10px}
/* editable text */
[contenteditable=true]{cursor:text;outline:1px dashed rgba(201,169,110,.4);outline-offset:4px;border-radius:2px}
[contenteditable=true]:hover{outline:1px solid var(--gold)}
[contenteditable=true]:focus{outline:1px solid var(--gold);background:rgba(201,169,110,.05)}
/* hdr upload */
#hdr-upload{display:none;position:absolute;inset:0;z-index:5;align-items:center;justify-content:center}
#hdr-upload label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:8px;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.15em;text-transform:uppercase}
#hdr-upload label:hover{color:var(--gold)}

/* pairs section */
.pairs-wrap{padding:60px 40px;max-width:1400px;margin:0 auto}
.section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400}
.pairs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px}

/* pair card */
.pair-card{background:var(--card);cursor:pointer;position:relative;overflow:hidden;aspect-ratio:3/4}
.pc-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s ease;background-color:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--border)}
.pair-card:hover .pc-img{transform:scale(1.04)}
.pc-info{position:absolute;bottom:0;left:0;right:0;padding:24px 20px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85));transform:translateY(8px);transition:transform .3s}
.pair-card:hover .pc-info{transform:translateY(0)}
.pc-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;margin-bottom:4px;color:#fff}
.pc-catch{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.05em}
.pc-edit{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20}
/* edit mode shows pc-edit on hover */
body.edit-mode .pair-card:hover .pc-edit{display:flex}
.add-card{background:var(--surface);border:1px dashed var(--border);aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:12px;color:var(--sub);font-size:11px;letter-spacing:.15em;text-transform:uppercase;transition:all .2s}
.add-card:hover{border-color:var(--gold);color:var(--gold)}

/* ── DETAIL ── */
#pg-detail .layout{display:flex;min-height:100vh}
.side{width:220px;flex-shrink:0;background:var(--surface);padding:36px 16px;position:relative;display:flex;flex-direction:column;align-items:center;border-right:1px solid var(--border)}
.side.right{border-right:none;border-left:1px solid var(--border)}
.side-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2}
.bright-ctrl{display:none;position:absolute;top:10px;right:10px;flex-direction:column;gap:4px;z-index:10}
body.edit-mode .bright-ctrl{display:flex}
.bright-btn{width:24px;height:24px;background:rgba(0,0,0,.6);border:1px solid var(--border);color:var(--cream);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bright-btn:hover{border-color:var(--gold);color:var(--gold)}
.char-photo-wrap{position:relative;z-index:2;width:130px;height:170px;background:var(--card);margin-bottom:14px;overflow:hidden;flex-shrink:0}
.char-photo{width:100%;height:100%;background-size:cover;background-position:top center;background-color:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--border)}
.char-photo-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--gold);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
body.edit-mode .char-photo-wrap:hover .char-photo-ov{display:flex}
.char-name{position:relative;z-index:2;font-family:'Playfair Display',serif;font-size:15px;text-align:center;margin-bottom:10px;min-width:80px}
.prompt-wrap{position:relative;z-index:2;width:100%}
.prompt-toggle-btn{width:100%;background:none;border:1px solid var(--border);color:var(--sub);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:7px 10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.prompt-toggle-btn:hover{border-color:var(--gold);color:var(--gold)}
.prompt-body{display:none;background:rgba(0,0,0,.4);border:1px solid var(--border);border-top:none;padding:10px}
.prompt-body.open{display:block}
.prompt-text{font-size:11px;line-height:1.6;color:var(--cream);white-space:pre-wrap;word-break:break-all;min-height:30px}
.prompt-actions{display:flex;gap:6px;margin-top:8px}

/* center */
.detail-center{flex:1;padding:36px 24px;min-width:0}
.detail-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.detail-title{font-family:'Playfair Display',serif;font-size:20px}
.back-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px;padding:0;transition:color .2s}
.back-btn:hover{color:var(--gold)}
.outfit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.outfit-card{background:var(--card);cursor:pointer;position:relative;border:1px solid transparent;transition:border-color .2s}
.outfit-card:hover{border-color:var(--gold)}
.outfit-card-img{aspect-ratio:3/5;background-size:cover;background-position:top center;background-color:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--border)}
.outfit-card-name{padding:8px 10px;font-size:11px;letter-spacing:.08em;text-align:center;color:var(--cream)}
.outfit-edit-ov{display:none;position:absolute;top:4px;right:4px;flex-direction:column;gap:4px;z-index:5}
body.edit-mode .outfit-card:hover .outfit-edit-ov{display:flex}
.add-outfit-card{background:var(--surface);border:1px dashed var(--border);aspect-ratio:3/5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--sub);font-size:10px;letter-spacing:.12em;text-transform:uppercase;transition:all .2s}
.add-outfit-card:hover{border-color:var(--gold);color:var(--gold)}
.page-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:24px}
.page-dot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s}
.page-dot.on{background:var(--gold)}

/* ── OUTFIT DETAIL ── */
.od-wrap{max-width:960px;margin:0 auto;padding:50px 30px}
.od-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.od-name{font-family:'Playfair Display',serif;font-size:24px}
.od-body{display:grid;grid-template-columns:320px 1fr;gap:40px;align-items:start}
.od-photo{width:100%;aspect-ratio:2/3;background:var(--card);position:relative;overflow:hidden}
.od-photo-img{width:100%;height:100%;background-size:cover;background-position:top center;background-color:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--border)}
.od-photo-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;color:var(--gold);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
body.edit-mode .od-photo:hover .od-photo-ov{display:flex}
.prompt-sec{border:1px solid var(--border);background:var(--surface);margin-bottom:12px}
.prompt-sec-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.prompt-sec-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.prompt-sec-body{padding:12px 14px}
.prompt-content{font-size:12px;line-height:1.7;color:var(--cream);white-space:pre-wrap;word-break:break-all;min-height:36px}
.prompt-content[contenteditable=true]:empty::before{content:'입력하세요...';color:var(--sub);font-style:italic}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);padding:36px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-field{margin-bottom:14px}
.modal-label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.modal-x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{color:var(--cream)}
.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px dashed var(--border);cursor:pointer;height:90px;color:var(--sub);font-size:10px;letter-spacing:.1em;text-transform:uppercase;gap:8px;transition:all .2s}
.upload-area:hover{border-color:var(--gold);color:var(--gold)}
#thumb-preview,#outfit-thumb-prev{margin-top:8px;display:none}
#thumb-preview img,#outfit-thumb-prev img{width:100%;height:100px;object-fit:cover}

/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);padding:10px 22px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}

/* RESPONSIVE */
@media(max-width:900px){
  .side{width:160px;padding:24px 10px}
  .char-photo-wrap{width:100px;height:130px}
  .outfit-grid{grid-template-columns:repeat(2,1fr)}
  .od-body{grid-template-columns:1fr}
}
@media(max-width:600px){
  #pg-detail .layout{flex-direction:column}
  .side{width:100%;border-right:none;border-left:none;border-bottom:1px solid var(--border);flex-direction:row;align-items:flex-start;padding:16px;gap:14px}
  .side.right{border-top:1px solid var(--border)}
  .char-photo-wrap{width:80px;height:104px;margin-bottom:0;flex-shrink:0}
  .pairs-wrap{padding:30px 16px}
  .pairs-grid{grid-template-columns:repeat(2,1fr)}
  .detail-center{padding:20px 14px}
  .outfit-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .od-wrap{padding:30px 16px}
  #hdr{height:140px}
  .hdr-title{font-size:28px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">LOOKBOOK</div>
    <div class="auth-tag">Fashion Archive</div>
    <input type="password" id="auth-pw" placeholder="· · · · · · · ·" autocomplete="off">
    <button class="btn btn-solid" style="width:100%" id="auth-btn">Enter</button>
    <div id="auth-err"></div>
    <div class="auth-hint">관리자는 비밀번호 입력 / 게스트는 빈칸으로 Enter</div>
  </div>
</div>

<!-- EDIT BAR -->
<div id="editbar">
  <div class="edit-status"><div class="edit-dot"></div>편집 모드</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" id="btn-export">내보내기</button>
    <button class="btn btn-sm btn-ghost" id="btn-import">불러오기</button>
    <button class="btn btn-sm btn-ghost" id="btn-editoff">✕ 종료</button>
  </div>
</div>
<input type="file" id="import-file" accept=".json" style="display:none">

<!-- PAGES -->
<div id="pg-main" class="pg on">
  <div id="hdr">
    <div id="hdr-bg"></div>
    <div id="hdr-dim"></div>
    <div id="hdr-content">
      <div class="hdr-eye" id="txt-eye">Fashion Archive</div>
      <div class="hdr-title" id="txt-title">LOOKBOOK</div>
      <div class="hdr-sub" id="txt-sub">Character Styling Collection</div>
    </div>
    <div id="hdr-upload">
      <label>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        배경 이미지 업로드
        <input type="file" id="hdr-img-input" accept="image/*" style="display:none">
      </label>
    </div>
  </div>
  <div class="pairs-wrap">
    <div class="section-bar">
      <div><div class="eyebrow">Collection</div><div class="section-title serif">페어 룩북</div></div>
      <button class="btn btn-sm" id="btn-add-pair" style="display:none">+ 페어 추가</button>
    </div>
    <div class="pairs-grid" id="pairs-grid"></div>
  </div>
</div>

<div id="pg-detail" class="pg">
  <div class="layout">
    <div class="side" id="side-A">
      <div class="side-bg" id="sbg-A"></div>
      <div class="bright-ctrl">
        <button class="bright-btn" id="bright-A-up">+</button>
        <button class="bright-btn" id="bright-A-dn">−</button>
      </div>
      <div class="char-photo-wrap">
        <div class="char-photo" id="cphoto-A">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <label class="char-photo-ov" id="cphoto-A-ov">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          사진 업로드
          <input type="file" id="cphoto-A-input" accept="image/*" style="display:none">
        </label>
      </div>
      <div class="char-name" id="cname-A">Character A</div>
      <div class="prompt-wrap">
        <button class="prompt-toggle-btn" id="ptoggle-A"><span>프롬프트</span><span id="parrow-A">▾</span></button>
        <div class="prompt-body" id="pbody-A">
          <div class="prompt-text" id="ptext-A">프롬프트를 입력하세요...</div>
          <div class="prompt-actions">
            <button class="btn btn-sm" id="pcopy-A">복사</button>
          </div>
        </div>
      </div>
    </div>

    <div class="detail-center">
      <div class="detail-topbar">
        <div><div class="eyebrow">Pair Lookbook</div><div class="detail-title serif" id="detail-title">—</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-sm" id="btn-add-outfit" style="display:none">+ 의상 추가</button>
          <button class="back-btn" id="btn-back-main">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            메인으로
          </button>
        </div>
      </div>
      <div class="outfit-grid" id="outfit-grid"></div>
      <div class="page-nav" id="page-nav"></div>
    </div>

    <div class="side right" id="side-B">
      <div class="side-bg" id="sbg-B"></div>
      <div class="bright-ctrl">
        <button class="bright-btn" id="bright-B-up">+</button>
        <button class="bright-btn" id="bright-B-dn">−</button>
      </div>
      <div class="char-photo-wrap">
        <div class="char-photo" id="cphoto-B">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <label class="char-photo-ov" id="cphoto-B-ov">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          사진 업로드
          <input type="file" id="cphoto-B-input" accept="image/*" style="display:none">
        </label>
      </div>
      <div class="char-name" id="cname-B">Character B</div>
      <div class="prompt-wrap">
        <button class="prompt-toggle-btn" id="ptoggle-B"><span>프롬프트</span><span id="parrow-B">▾</span></button>
        <div class="prompt-body" id="pbody-B">
          <div class="prompt-text" id="ptext-B">프롬프트를 입력하세요...</div>
          <div class="prompt-actions">
            <button class="btn btn-sm" id="pcopy-B">복사</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="pg-outfit" class="pg">

<!-- MODAL: Add Outfit -->
<div class="modal-bg" id="modal-outfit">
  <div class="modal">
    <button class="modal-x" id="outfit-modal-x">✕</button>
    <div class="modal-title serif">의상 추가</div>
    <div class="modal-field"><label class="modal-label">의상 이름</label><input type="text" id="outfit-name"></div>

      <label class="modal-label">캐릭터</label>

        <button class="btn btn-sm btn-ghost" id="char-sel-B" style="flex:1">B 캐릭터</button>

    <div class="modal-field">
      <label class="modal-label">썸네일</label>

        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        이미지 선택
        <input type="file" id="outfit-thumb-input" accept="image/*" style="display:none">
      </label>
      <div id="outfit-thumb-prev"><img id="outfit-thumb-img"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="outfit-cancel">취소</button>
      <button class="btn btn-solid btn-sm" id="outfit-submit">추가</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
const ADMIN_PW = 'lookbook2025';
const PER_PAGE = 8;

// 배포용: 아래 null을 내보낸 JSON 데이터로 교체하세요
const DEPLOY_DATA = null;

let S = DEPLOY_DATA ? JSON.parse(JSON.stringify(DEPLOY_DATA)) : {
  hdrBg: '', hdrDim: 0.4,
  eye: 'Fashion Archive', title: 'LOOKBOOK', sub: 'Character Styling Collection',
  pairs: []
};
// pair = { id, name, catch, thumb,
//   charA:{name,photo,prompt,bgOp,sideBg},
//   charB:{...}, outfits:[] }
// outfit = { id, char, name, thumb, fullPhoto,
//   prompts:{top,bottom,acc,shoes,etc} }

let isAdmin = false;
let curPair = null;   // pair id
let curOutfit = null; // outfit id
let oPage = 0;
let selChar = 'A';    // for outfit modal

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
const $ = id => document.getElementById(id);
const getPair = id => S.pairs.find(p => p.id === id);
const getOutfit = (pid, oid) => { const p = getPair(pid); return p ? p.outfits.find(o => o.id === oid) : null; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

function toDataURL(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

function showPage(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(id).classList.add('on');
  window.scrollTo(0, 0);
}

function openModal(id) { $(id).classList.add('on'); }
function closeModal(id) { $(id).classList.remove('on'); }

// ════════════════════════════════════
//  AUTH
// ════════════════════════════════════
function doAuth() {
  const pw = $('auth-pw').value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    $('auth').style.display = 'none';
    $('editbar').classList.add('on');
    document.body.classList.add('edit-mode');
    $('btn-add-pair').style.display = '';
    $('btn-add-outfit').style.display = '';
    renderMain();
  } else if (pw === '') {
    $('auth').style.display = 'none';
    renderMain();
  } else {
    $('auth-err').textContent = '비밀번호가 올바르지 않습니다';
  }
}

$('auth-btn').addEventListener('click', doAuth);
$('auth-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

// ════════════════════════════════════
//  EDIT BAR
// ════════════════════════════════════
$('btn-editoff').addEventListener('click', () => {
  isAdmin = false;
  $('editbar').classList.remove('on');
  document.body.classList.remove('edit-mode');
  $('btn-add-pair').style.display = 'none';
  $('btn-add-outfit').style.display = 'none';
  // remove contenteditable
  document.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  renderMain();
});

$('btn-export').addEventListener('click', () => {
  const json = JSON.stringify(S, null, 2);
  try {
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
    const a = document.createElement('a');
    a.href = dataUri;
    a.download = 'lookbook-data.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('내보내기 완료!');
  } catch(e) {
    const w = window.open('', '_blank');
    if (w) {
      w.document.write('<pre style="white-space:pre-wrap;word-break:break-all;font-size:12px">' + json.replace(/</g,'&lt;') + '</pre>');
      w.document.title = 'lookbook-data.json';
      toast('새 창에서 내용을 복사하세요');
    } else {
      prompt('아래 JSON을 복사하세요:', json);
    }
  }
});

$('btn-import').addEventListener('click', () => $('import-file').click());
$('import-file').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  try {
    const text = await file.text();
    S = JSON.parse(text);
    renderMain();
    toast('불러오기 완료!');
  } catch { alert('파일 형식이 올바르지 않습니다'); }
  e.target.value = '';
});

// ════════════════════════════════════
//  RENDER MAIN
// ════════════════════════════════════
function renderMain() {
  // header
  $('hdr-bg').style.backgroundImage = S.hdrBg ? `url(${S.hdrBg})` : '';
  $('hdr-dim').style.opacity = S.hdrBg ? S.hdrDim : 0;
  $('hdr-upload').style.display = isAdmin ? 'flex' : 'none';

  // editable header texts
  setupEditable('txt-eye',   () => S.eye,   v => S.eye = v);
  setupEditable('txt-title', () => S.title, v => S.title = v);
  setupEditable('txt-sub',   () => S.sub,   v => S.sub = v);

  // pairs grid
  const grid = $('pairs-grid');
  grid.innerHTML = '';

  S.pairs.forEach(pair => {
    const card = document.createElement('div');
    card.className = 'pair-card';

    const img = document.createElement('div');
    img.className = 'pc-img';
    if (pair.thumb) img.style.backgroundImage = `url(${pair.thumb})`;
    else img.innerHTML = `<svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" opacity=".3" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

    const info = document.createElement('div');
    info.className = 'pc-info';
    info.innerHTML = `<div class="pc-name">${pair.name||'이름 없음'}</div><div class="pc-catch">${pair.catch||''}</div>`;

    card.appendChild(img);
    card.appendChild(info);

    if (isAdmin) {
      const editOv = document.createElement('div');
      editOv.className = 'pc-edit';

      const thumbLabel = document.createElement('label');
      thumbLabel.className = 'btn btn-sm';
      thumbLabel.textContent = '썸네일 변경';
      thumbLabel.style.cursor = 'pointer';
      const thumbInput = document.createElement('input');
      thumbInput.type = 'file'; thumbInput.accept = 'image/*'; thumbInput.style.display = 'none';
      thumbInput.addEventListener('change', async e2 => {
        e2.stopPropagation();
        const f = e2.target.files[0]; if (!f) return;
        pair.thumb = await toDataURL(f);
        renderMain();
      });
      thumbLabel.appendChild(thumbInput);

      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger';
      delBtn.textContent = '삭제';
      delBtn.addEventListener('click', e2 => {
        e2.stopPropagation();
        if (!confirm('이 페어를 삭제할까요?')) return;
        S.pairs = S.pairs.filter(p => p.id !== pair.id);
        renderMain();
      });

      editOv.appendChild(thumbLabel);
      editOv.appendChild(delBtn);

      // 오버레이 자체엔 stopPropagation 제거 → 카드 클릭 이벤트가 통과되도록
      card.appendChild(editOv);
    }

    // CLICK → go to detail (only if not clicking edit overlay)
    card.addEventListener('click', () => {
      navToDetail(pair.id);
    });

    grid.appendChild(card);
  });

  // add card (edit only)
  if (isAdmin) {
    const add = document.createElement('div');
    add.className = 'add-card';
    add.innerHTML = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>페어 추가</span>`;
    add.addEventListener('click', () => openPairModal());
    grid.appendChild(add);
  }
}

function setupEditable(id, getter, setter) {
  const el = $(id);
  if (!el) return;
  if (el.innerText !== getter()) el.innerText = getter();
  if (isAdmin) {
    el.setAttribute('contenteditable', 'true');
    el.onblur = () => setter(el.innerText);
  } else {
    el.removeAttribute('contenteditable');
    el.onblur = null;
  }
}

// ════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════
function navToDetail(pairId) {
  curPair = pairId;
  oPage = 0;
  renderDetail();
  showPage('pg-detail');
}

function navToOutfit(outfitId) {
  curOutfit = outfitId;
  renderOutfitDetail();
  showPage('pg-outfit');
}

$('btn-back-main').addEventListener('click', () => {
  showPage('pg-main');
  renderMain();
});

$('btn-back-detail').addEventListener('click', () => {
  renderDetail();
  showPage('pg-detail');
});

// ════════════════════════════════════
//  RENDER DETAIL
// ════════════════════════════════════
function renderDetail() {
  const pair = getPair(curPair); if (!pair) return;
  $('detail-title').textContent = pair.name || '—';

  ['A','B'].forEach(ch => {
    const c = ch === 'A' ? pair.charA : pair.charB;
    const sbg = $(`sbg-${ch}`);
    sbg.style.backgroundImage = c.sideBg ? `url(${c.sideBg})` : '';
    sbg.style.opacity = c.bgOp ?? 0.2;

    const photo = $(`cphoto-${ch}`);
    if (c.photo) { photo.style.backgroundImage = `url(${c.photo})`; photo.innerHTML = ''; }
    else { photo.style.backgroundImage = ''; photo.innerHTML = `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1" opacity=".3" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`; }

    const nameEl = $(`cname-${ch}`);
    nameEl.textContent = c.name || `Character ${ch}`;
    if (isAdmin) {
      nameEl.setAttribute('contenteditable', 'true');
      nameEl.onblur = () => { c.name = nameEl.textContent; };
    } else {
      nameEl.removeAttribute('contenteditable');
    }

    const ptextEl = $(`ptext-${ch}`);
    ptextEl.textContent = c.prompt || '';
    if (isAdmin) {
      ptextEl.setAttribute('contenteditable', 'true');
      ptextEl.onblur = () => { c.prompt = ptextEl.textContent; };
    } else {
      ptextEl.removeAttribute('contenteditable');
    }
  });

  renderOutfitGrid();
}

// ════════════════════════════════════
//  OUTFIT GRID
// ════════════════════════════════════
function renderOutfitGrid() {
  const pair = getPair(curPair); if (!pair) return;
  const grid = $('outfit-grid');
  const nav = $('page-nav');
  grid.innerHTML = '';
  nav.innerHTML = '';

  const outfits = pair.outfits;
  const totalPages = Math.max(1, Math.ceil(outfits.length / PER_PAGE));
  if (oPage >= totalPages) oPage = totalPages - 1;

  const slice = outfits.slice(oPage * PER_PAGE, oPage * PER_PAGE + PER_PAGE);

  slice.forEach(outfit => {
    const card = document.createElement('div');
    card.className = 'outfit-card';

    const imgDiv = document.createElement('div');
    imgDiv.className = 'outfit-card-img';
    if (outfit.thumb) imgDiv.style.backgroundImage = `url(${outfit.thumb})`;
    else imgDiv.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1" opacity=".2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

    const nameDiv = document.createElement('div');
    nameDiv.className = 'outfit-card-name';
    nameDiv.textContent = outfit.name || '의상';

    card.appendChild(imgDiv);
    card.appendChild(nameDiv);

    if (isAdmin) {
      const ov = document.createElement('div');
      ov.className = 'outfit-edit-ov';

      const tLabel = document.createElement('label');
      tLabel.className = 'btn btn-sm';
      tLabel.style.cursor = 'pointer';
      tLabel.innerHTML = `<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>`;
      const tInput = document.createElement('input');
      tInput.type = 'file'; tInput.accept = 'image/*'; tInput.style.display = 'none';
      tInput.addEventListener('change', async e => {
        e.stopPropagation();
        const f = e.target.files[0]; if (!f) return;
        outfit.thumb = await toDataURL(f);
        renderOutfitGrid();
      });
      tLabel.appendChild(tInput);

      const dBtn = document.createElement('button');
      dBtn.className = 'btn btn-sm btn-danger';
      dBtn.textContent = '✕';
      dBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!confirm('삭제할까요?')) return;
        pair.outfits = pair.outfits.filter(o => o.id !== outfit.id);
        renderOutfitGrid();
      });

      ov.appendChild(tLabel);
      ov.appendChild(dBtn);
      ov.addEventListener('click', e => e.stopPropagation());
      card.appendChild(ov);
    }

    card.addEventListener('click', () => navToOutfit(outfit.id));
    grid.appendChild(card);
  });

  // add outfit card
  if (isAdmin) {
    const add = document.createElement('div');
    add.className = 'add-outfit-card';
    add.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>의상 추가</span>`;
    add.addEventListener('click', () => openOutfitModal());
    grid.appendChild(add);
  }

  // page dots
  if (totalPages > 1) {
    for (let i = 0; i < totalPages; i++) {
      const dot = document.createElement('div');
      dot.className = 'page-dot' + (i === oPage ? ' on' : '');
      dot.addEventListener('click', () => { oPage = i; renderOutfitGrid(); });
      nav.appendChild(dot);
    }
  }
}

// ════════════════════════════════════
//  RENDER OUTFIT DETAIL
// ════════════════════════════════════
const PLABELS = { top:'상의', bottom:'하의', acc:'악세사리', shoes:'신발', etc:'기타' };

function renderOutfitDetail() {
  const pair = getPair(curPair);
  const outfit = getOutfit(curPair, curOutfit);
  if (!pair || !outfit) return;

  $('od-eye').textContent = pair.name;
  const nameEl = $('od-name');
  nameEl.textContent = outfit.name || '의상';
  if (isAdmin) {
    nameEl.setAttribute('contenteditable', 'true');
    nameEl.onblur = () => { outfit.name = nameEl.textContent; };
  } else nameEl.removeAttribute('contenteditable');

  const imgEl = $('od-photo-img');
  if (outfit.fullPhoto) { imgEl.style.backgroundImage = `url(${outfit.fullPhoto})`; imgEl.innerHTML = ''; }
  else { imgEl.style.backgroundImage = ''; imgEl.innerHTML = `<svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1" opacity=".3" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`; }

  const container = $('od-prompts');
  container.innerHTML = '';
  Object.entries(PLABELS).forEach(([key, label]) => {
    if (!outfit.prompts) outfit.prompts = {};
    const val = outfit.prompts[key] || '';

    const sec = document.createElement('div');
    sec.className = 'prompt-sec';
    const head = document.createElement('div');
    head.className = 'prompt-sec-head';

    const lbl = document.createElement('span');
    lbl.className = 'prompt-sec-label';
    lbl.textContent = label;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn btn-sm';
    copyBtn.textContent = '복사';

    head.appendChild(lbl);
    head.appendChild(copyBtn);

    const body = document.createElement('div');
    body.className = 'prompt-sec-body';

    const content = document.createElement('div');
    content.className = 'prompt-content';
    content.textContent = val;

    if (isAdmin) {
      content.setAttribute('contenteditable', 'true');
      content.onblur = () => { outfit.prompts[key] = content.textContent; };
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(content.textContent).then(() => toast('복사되었습니다'));
    });

    body.appendChild(content);
    sec.appendChild(head);
    sec.appendChild(body);
    container.appendChild(sec);
  });
}

// ════════════════════════════════════
//  CHAR PHOTO UPLOADS
// ════════════════════════════════════
['A','B'].forEach(ch => {
  $(`cphoto-${ch}-input`).addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    const pair = getPair(curPair); if (!pair) return;
    const c = ch === 'A' ? pair.charA : pair.charB;
    c.photo = await toDataURL(f);
    const photo = $(`cphoto-${ch}`);
    photo.style.backgroundImage = `url(${c.photo})`;
    photo.innerHTML = '';
    e.target.value = '';
  });

  $(`bright-${ch}-up`).addEventListener('click', () => {
    const pair = getPair(curPair); if (!pair) return;
    const c = ch === 'A' ? pair.charA : pair.charB;
    c.bgOp = Math.min(1, (c.bgOp ?? 0.2) + 0.05);
    $(`sbg-${ch}`).style.opacity = c.bgOp;
  });
  $(`bright-${ch}-dn`).addEventListener('click', () => {
    const pair = getPair(curPair); if (!pair) return;
    const c = ch === 'A' ? pair.charA : pair.charB;
    c.bgOp = Math.max(0, (c.bgOp ?? 0.2) - 0.05);
    $(`sbg-${ch}`).style.opacity = c.bgOp;
  });

  $(`ptoggle-${ch}`).addEventListener('click', () => {
    const body = $(`pbody-${ch}`);
    const arrow = $(`parrow-${ch}`);
    body.classList.toggle('open');
    arrow.textContent = body.classList.contains('open') ? '▴' : '▾';
  });

  $(`pcopy-${ch}`).addEventListener('click', () => {
    navigator.clipboard.writeText($(`ptext-${ch}`).textContent).then(() => toast('복사되었습니다'));
  });
});

// header bg upload
$('hdr-img-input').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  S.hdrBg = await toDataURL(f);
  $('hdr-bg').style.backgroundImage = `url(${S.hdrBg})`;
  $('hdr-dim').style.opacity = S.hdrDim;
  e.target.value = '';
});

// outfit full photo
$('od-photo-input').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  const outfit = getOutfit(curPair, curOutfit); if (!outfit) return;
  outfit.fullPhoto = await toDataURL(f);
  const imgEl = $('od-photo-img');
  imgEl.style.backgroundImage = `url(${outfit.fullPhoto})`;
  imgEl.innerHTML = '';
  e.target.value = '';
});

// add outfit button
$('btn-add-outfit').addEventListener('click', () => openOutfitModal());

// ════════════════════════════════════
//  PAIR MODAL
// ════════════════════════════════════
let pendingPairThumb = '';

function openPairModal() {
  pendingPairThumb = '';
  $('pair-name').value = '';
  $('pair-catch').value = '';
  $('thumb-preview').style.display = 'none';
  $('pair-thumb-input').value = '';
  openModal('modal-pair');
}

$('pair-modal-x').addEventListener('click', () => closeModal('modal-pair'));
$('pair-cancel').addEventListener('click', () => closeModal('modal-pair'));
$('modal-pair').addEventListener('click', e => { if (e.target === $('modal-pair')) closeModal('modal-pair'); });

$('pair-thumb-input').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  pendingPairThumb = await toDataURL(f);
  $('thumb-preview-img').src = pendingPairThumb;
  $('thumb-preview').style.display = '';
});

$('pair-submit').addEventListener('click', () => {
  const name = $('pair-name').value.trim();
  if (!name) { alert('페어명을 입력하세요'); return; }
  S.pairs.push({
    id: uid(), name, catch: $('pair-catch').value.trim(), thumb: pendingPairThumb,
    charA: { name:'Character A', photo:'', prompt:'', bgOp:0.2, sideBg:'' },
    charB: { name:'Character B', photo:'', prompt:'', bgOp:0.2, sideBg:'' },
    outfits: []
  });
  closeModal('modal-pair');
  renderMain();
  toast('페어가 추가되었습니다');
});

// ════════════════════════════════════
//  OUTFIT MODAL
// ════════════════════════════════════
let pendingOutfitThumb = '';

function openOutfitModal() {
  pendingOutfitThumb = '';
  selChar = 'A';
  $('outfit-name').value = '';
  $('outfit-thumb-prev').style.display = 'none';
  $('outfit-thumb-input').value = '';
  $('char-sel-A').className = 'btn btn-sm';
  $('char-sel-B').className = 'btn btn-sm btn-ghost';
  openModal('modal-outfit');
}

$('outfit-modal-x').addEventListener('click', () => closeModal('modal-outfit'));
$('outfit-cancel').addEventListener('click', () => closeModal('modal-outfit'));
$('modal-outfit').addEventListener('click', e => { if (e.target === $('modal-outfit')) closeModal('modal-outfit'); });

$('char-sel-A').addEventListener('click', () => {
  selChar = 'A';
  $('char-sel-A').className = 'btn btn-sm';
  $('char-sel-B').className = 'btn btn-sm btn-ghost';
});
$('char-sel-B').addEventListener('click', () => {
  selChar = 'B';
  $('char-sel-A').className = 'btn btn-sm btn-ghost';
  $('char-sel-B').className = 'btn btn-sm';
});

$('outfit-thumb-input').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  pendingOutfitThumb = await toDataURL(f);
  $('outfit-thumb-img').src = pendingOutfitThumb;
  $('outfit-thumb-prev').style.display = '';
});

$('outfit-submit').addEventListener('click', () => {
  const pair = getPair(curPair); if (!pair) return;
  const name = $('outfit-name').value.trim();
  if (!name) { alert('의상 이름을 입력하세요'); return; }
  pair.outfits.push({
    id: uid(), char: selChar, name, thumb: pendingOutfitThumb, fullPhoto: '',
    prompts: { top:'', bottom:'', acc:'', shoes:'', etc:'' }
  });
  oPage = Math.floor((pair.outfits.length - 1) / PER_PAGE);
  closeModal('modal-outfit');
  renderOutfitGrid();
  toast('의상이 추가되었습니다');
});

// ════════════════════════════════════
//  INIT — wait for auth
// ════════════════════════════════════
// nothing auto-runs; renderMain() called after auth
</script>
